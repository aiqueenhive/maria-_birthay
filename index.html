<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Happy Birthday Maria ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Netflix Intro -->
    <div id="intro">

        <h1 class="netflix-logo">NETFLIX</h1>

    </div>

    <!-- Main Website -->

    <section class="hero">

        <div class="overlay"></div>

        <div class="content">

            <h3>🎉 Happy Birthday 🎉</h3>

            <h1>Maria ❤️</h1>

            <p id="typing"></p>

            <button id="startBtn">

                Open Your Surprise 🎁

            </button>

        </div>

    </section>

    <!-- Animated Girl -->

    <section class="girl-section">

        <div class="girl">

            👩‍💻

        </div>

        <h2>

            Hi Maria ❤️

        </h2>

        <p>

            Today is your special day.

            I have something beautiful for you.

        </p>

    </section>

    <!-- Gift Boxes -->

    <section class="gift-section">

        <h2>Your Birthday Gifts 🎁</h2>

        <div class="gifts">

            <div class="gift">
                🎁
                <span>Baggy Pants 👖</span>
            </div>

            <div class="gift">
                🎁
                <span>T-Shirt 👕</span>
            </div>

            <div class="gift">
                🎁
                <span>Beautiful Watch ⌚</span>
            </div>

        </div>

    </section>

    <!-- Cake -->

    <section class="cake">

        <h2>🎂</h2>

        <h1>Happy Birthday Maria</h1>

    </section>

    <!-- Gallery -->

    <section class="gallery">

        <h2>Beautiful Memories 📸</h2>

        <div class="photos">

            <img src="assets/maria1.jpg">

            <img src="assets/maria2.jpg">

            <img src="assets/maria3.jpg">

        </div>

    </section>

    <!-- Music -->

    <audio autoplay loop>

        <source src="assets/music.mp3" type="audio/mp3">

    </audio>

    <script src="script.js"></script>

</body>

</html>
